<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이태인 ♥ 하송이 - 결혼합니다</title>
    <meta name="description" content="이태인과 하송이의 결혼식에 초대합니다">

    <!-- Open Graph -->
    <meta property="og:title" content="이태인 ♥ 하송이 - 결혼합니다">
    <meta property="og:description" content="2026년 9월 12일 오전 11:00, 저희 결혼합니다">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/public/images/gallery/IMG_5688.jpg">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f9fbec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .loading {
            text-align: center;
            color: #333;
            animation: pulse 1.5s ease-in-out infinite alternate;
        }
        .loading h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #ed931e;
        }
        .loading p {
            font-size: 1.1rem;
            margin: 0.5rem 0;
        }
        .hearts {
            font-size: 1.5rem;
            margin: 1rem 0;
            animation: heartbeat 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <h1>이태인 ♥ 하송이</h1>
        <div class="hearts">💕 💒 💕</div>
        <p>✨ 웨딩 페이지를 불러오는 중...</p>
        <p style="font-size: 0.9rem; color: #666;">잠시만 기다려주세요</p>
    </div>

    <script>
        // 루트 경로에서만 리다이렉트 실행
        const currentPath = window.location.pathname;
        console.log(`Current path: ${currentPath}`);

        if (currentPath === '/' || currentPath === '') {
            // 완전 랜덤 리다이렉트 (50/50 확률)
            const isGroom = Math.random() < 0.5;
            const redirectUrl = isGroom ? './groom/' : './bride/';

            console.log(`Redirecting to: ${isGroom ? 'Groom' : 'Bride'} version`);

            // 1초 후 리다이렉트 (로딩 효과)
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 1000);
        } else {
            console.log(`Already in specific path (${currentPath}), no redirect needed`);
        }
    </script>
</body>
</html>
